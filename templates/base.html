<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recycling Waste System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: #10b981;
        --secondary-color: #f97316;
        --dark-color: #1f2937;
      }
      body {
        background: linear-gradient(135deg, #f0fdf4 0%, #f0f9ff 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .navbar {
        background: linear-gradient(
          90deg,
          var(--primary-color) 0%,
          var(--secondary-color) 100%
        ) !important;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .navbar-brand {
        font-weight: 700;
        font-size: 1.5rem;
        color: white !important;
      }
      .nav-link {
        color: white !important;
        margin-left: 1.5rem;
        font-weight: 500;
        transition: opacity 0.3s;
      }
      .nav-link:hover {
        opacity: 0.8;
      }
      .container {
        flex: 1;
      }
      .alert {
        border-radius: 0.5rem;
        border: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .btn-primary {
        background: var(--primary-color);
        border: 0;
        transition: all 0.3s;
      }
      .btn-primary:hover {
        background: #059669;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      }
      footer {
        background: var(--dark-color);
        color: white;
        padding: 2rem;
        text-align: center;
        margin-top: auto;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}"
          ><i class="fas fa-recycle"></i> Recycling Waste</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
            <span class="nav-link"
              ><i class="fas fa-user"></i> {{ user.username }}</span
            >
            <a class="nav-link" href="{% url 'submit' %}"
              ><i class="fas fa-plus"></i> Submit Item</a
            >
            <a class="nav-link" href="{% url 'logout' %}"
              ><i class="fas fa-sign-out-alt"></i> Logout</a
            >
            {% else %}
            <a class="nav-link" href="{% url 'login' %}"
              ><i class="fas fa-sign-in-alt"></i> Login</a
            >
            <a class="nav-link" href="{% url 'register' %}"
              ><i class="fas fa-user-plus"></i> Register</a
            >
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <div class="container mt-5">
      {% if messages %} {% for message in messages %}
      <div
        class="alert alert-{{ message.tags }} alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endif %} {% block content %}{% endblock %}
    </div>
    <footer>
      <p>&copy; 2024 Recycling Waste System. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
